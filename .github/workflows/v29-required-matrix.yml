name: v2.9.5 Required Matrix

# This workflow fixes the standing required CI set for v2.9.5.
# Real-data benchmark full / production full remain local heavy runs and are
# intentionally excluded from branch-protection checks.

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  benchmark-integrated-smoke:
    name: required / benchmark-integrated-smoke
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run benchmark integrated smoke
        run: uv run pytest -q tests/v29/test_9kr6_benchmark_smoke.py

  production-integrated-smoke:
    name: required / production-integrated-smoke
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run production integrated smoke
        run: uv run pytest -q tests/v29/test_9kr6_production_smoke.py

  ci-sized-full-fixture:
    name: required / ci-sized-full-fixture
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run CI-sized full fixture coverage
        run: uv run pytest -q tests/v29/test_cli_full_smoke.py tests/v29/test_cap_assay_fixtures.py

  config-guard-matrix:
    name: required / config-guard-matrix
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run config guard matrix
        run: uv run pytest -q tests/test_cli_config_guards.py tests/test_config_taxonomy.py

  replay-inventory-crosscheck:
    name: required / replay-inventory-crosscheck
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run replay audit and inventory cross-check coverage
        run: uv run pytest -q tests/v29/test_replay_audit.py tests/v29/test_manifest_inventory.py tests/v29/test_report_contract_matrix.py

  cap-artifact-invariants:
    name: required / cap-artifact-invariants
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run Cap artifact invariants
        run: uv run pytest -q tests/v29/test_cap_invariants.py

  required-v29-matrix:
    name: required / v2.9.5-matrix
    runs-on: windows-latest
    timeout-minutes: 10
    needs:
      - benchmark-integrated-smoke
      - production-integrated-smoke
      - ci-sized-full-fixture
      - config-guard-matrix
      - replay-inventory-crosscheck
      - cap-artifact-invariants
    steps:
      - name: Required matrix passed
        run: Write-Host "v2.9.5 required matrix passed"
