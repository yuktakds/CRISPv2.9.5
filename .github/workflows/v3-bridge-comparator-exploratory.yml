name: v3 Bridge Comparator Exploratory

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  path-bridge-comparator:
    name: exploratory / v3-path-bridge-comparator
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run path-only bridge comparator coverage
        run: >
          uv run pytest -q
          tests/v3/test_rc2_adapter.py
          tests/v3/test_bridge_comparator.py
          tests/v3/test_bridge_reports.py
          tests/v29/test_bridge_shadow_mode.py

