name: v3 Catalytic Sidecar Exploratory

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  catalytic-sidecar-materialization:
    name: exploratory / v3-catalytic-sidecar-materialization
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run catalytic sidecar coverage
        run: >
          uv run pytest -q
          tests/v3/test_policy.py
          tests/v3/test_catalytic_channel.py
          tests/v3/test_catalytic_projector.py
          tests/v3/test_catalytic_materialization.py
